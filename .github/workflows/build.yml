name: Build Cat Desktop Pet EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装全部依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 执行打包
        run: pyinstaller build.spec

      - name: 上传成品EXE
        uses: actions/upload-artifact@v4
        with:
          name: FluffyCatPet-Windows
          path: dist/FluffyCatPet.exe
